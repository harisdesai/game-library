<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AISA Smart Attendance</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#f1f5f9; }

.active-btn{
    background:#2563eb !important;
    color:white !important;
    transform:scale(1.05);
}

.fade-in{
    animation:fade .4s ease-in-out;
}
@keyframes fade{
    from{opacity:0; transform:translateY(-10px);}
    to{opacity:1; transform:translateY(0);}
}

button{ min-height:48px; }
</style>
</head>

<body class="p-3 sm:p-6">

<!-- Custom Message Box for modern notifications -->
<div id="messageBox" class="hidden fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-xl text-white font-bold shadow-xl z-50 transition-all text-center w-11/12 max-w-md"></div>

<div class="max-w-5xl mx-auto bg-white p-4 sm:p-8 rounded-2xl shadow-xl fade-in mt-4">

<h1 class="text-xl sm:text-2xl font-bold mb-6 text-center">
    AISA Smart Attendance
</h1>

<form id="sheetForm" class="space-y-6">

<!-- PRN -->
<div>
<label class="font-bold text-gray-500 text-sm">Select PRN</label>
<div id="prnGroup" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-2 mt-2"></div>
<input type="hidden" id="prn">
</div>

<!-- FACULTY -->
<div>
<label class="font-bold text-gray-500 text-sm">Select Faculty</label>
<div id="facultyGroup" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-2 mt-2"></div>
<input type="hidden" id="faculty">
</div>

<!-- TYPE -->
<div>
<label class="font-bold text-gray-500 text-sm">Type</label>
<div class="flex gap-2 mt-2">
<button type="button" onclick="setType('L')" id="btnL"
class="flex-1 bg-blue-600 text-white rounded-xl font-bold transition">
Lecture
</button>

<button type="button" onclick="setType('P')" id="btnP"
class="flex-1 bg-gray-200 text-gray-800 rounded-xl font-bold transition">
Lab
</button>
</div>
<input type="hidden" id="entryType" value="L">
</div>

<!-- SUBJECT -->
<div>
<label class="font-bold text-gray-500 text-sm">Select Subject</label>
<div id="subjectGroup" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-2 mt-2"></div>
<input type="hidden" id="course">
</div>

<!-- DATE -->
<div>
<label class="font-bold text-gray-500 text-sm">Date</label>
<input type="date" id="date" class="w-full border p-3 rounded-xl mt-2 text-center focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>

<!-- TIME -->
<div>
<label class="font-bold text-gray-500 text-sm">Select Time Slot</label>
<div id="timeGroup" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2 mt-2"></div>
<input type="hidden" id="timeslot">
</div>

<div class="sticky bottom-0 bg-white pt-4 pb-2">
<button type="submit" id="submitBtn"
class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl text-lg shadow-lg transition transform active:scale-95">
Save Attendance
</button>
</div>

</form>
</div>

<footer class="mt-8 text-center text-sm text-gray-500 pb-6">
© 2026 All Rights Reserved | Developed by 
<span class="font-semibold text-gray-700">Navanath</span> &
<span class="font-semibold text-gray-700">Haris</span>
</footer>

<script>
// Notification Helper
function showMessage(msg, isSuccess) {
    const box = document.getElementById('messageBox');
    box.innerText = msg;
    box.className = `fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-xl text-white font-bold shadow-xl z-50 fade-in w-11/12 max-w-md ${isSuccess ? 'bg-green-600' : 'bg-red-600'}`;
    box.classList.remove('hidden');
    
    setTimeout(() => {
        box.classList.add('hidden');
    }, 3000);
}

// ✅ YOUR GOOGLE SCRIPT URL
const scriptUrl = "https://script.google.com/macros/s/AKfycbxMAFAVfshAAzoBSuHIO4emmvRZi1kIehTFDB0s81NJNTYcUSY0QssXmdCu0QYMpUgA/exec";

document.getElementById('date').valueAsDate = new Date();

const PRNS = [
"23UAM005","23UAM008","23UAM012","23UAM015","23UAM024",
"23UAM026","23UAM027","23UAM051","23UAM055","23UAM060",
"23UAM063","23UAM079","23UAM086","23UAM111","23UAM121",
"23UAM124","23UET113","24UAM301","24UAM302"
];

const FACULTY = [
"DDM","SJT","VBS","SDR","PAA","SMK",
"MMB","VRK","SKS","VAM","RCP","NDL","AGS","HPC"
];

const LECTURES = [
"DeepLearning","Elective II","Elective III",
"WebTechnology","Advance Dot Net",
"MDM IOT","MDM Embedded","Honours"
];

const LABS = [
"WebTechnology Lab","Elective II Lab",
"Cloud Computing Lab","MDM (IOT) Lab",
"MDM (EMBEDDED) Lab","DeepLearning Lab",
"Advanced DOT NET Lab"
];

const LECTURE_TIMES = [
"09:40-10:40","10:40-11:40","11:50-12:50",
"12:50-01:50","02:30-03:30","03:30-04:30","04:30-05:30"
];

const LAB_TIMES = [
"09:40-11:40","11:50-01:50","02:30-04:30"
];

function createButtons(data, containerId, hiddenId){
    const container = document.getElementById(containerId);
    container.innerHTML = "";
    document.getElementById(hiddenId).value = ""; // Reset hidden value when switching

    data.forEach(item => {
        let btn = document.createElement("button");
        btn.type = "button";
        btn.innerText = item;
        btn.className = "bg-gray-200 text-gray-800 hover:bg-blue-600 hover:text-white rounded-xl text-sm font-medium transition duration-200";

        btn.onclick = () => {
            document.getElementById(hiddenId).value = item;
            Array.from(container.children).forEach(b => b.classList.remove("active-btn"));
            btn.classList.add("active-btn");
        };
        container.appendChild(btn);
    });
}

createButtons(PRNS, "prnGroup", "prn");
createButtons(FACULTY, "facultyGroup", "faculty");

// Fixed class toggling logic
function setType(val){
    document.getElementById("entryType").value = val;
    
    const btnL = document.getElementById("btnL");
    const btnP = document.getElementById("btnP");

    // 1. Remove active classes from both
    btnL.classList.remove("bg-blue-600", "text-white");
    btnP.classList.remove("bg-blue-600", "text-white");

    // 2. Add inactive classes to both
    btnL.classList.add("bg-gray-200", "text-gray-800");
    btnP.classList.add("bg-gray-200", "text-gray-800");

    if(val === "L"){
        // 3. Remove inactive class from active button and add active class
        btnL.classList.remove("bg-gray-200", "text-gray-800");
        btnL.classList.add("bg-blue-600", "text-white");
        
        createButtons(LECTURES, "subjectGroup", "course");
        createButtons(LECTURE_TIMES, "timeGroup", "timeslot");
    } else {
        // 3. Remove inactive class from active button and add active class
        btnP.classList.remove("bg-gray-200", "text-gray-800");
        btnP.classList.add("bg-blue-600", "text-white");
        
        createButtons(LABS, "subjectGroup", "course");
        createButtons(LAB_TIMES, "timeGroup", "timeslot");
    }
}

// Initialize default state
setType("L");

// ✅ SUBMIT HANDLER WITH VALIDATION + BUTTON LOCK
document.getElementById("sheetForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const submitBtn = document.getElementById("submitBtn");

    const prn = document.getElementById("prn").value;
    const faculty = document.getElementById("faculty").value;
    const course = document.getElementById("course").value;
    const type = document.getElementById("entryType").value;
    const date = document.getElementById("date").value;
    const timeslot = document.getElementById("timeslot").value;

    // 🔴 Mandatory Check
    if(!prn || !faculty || !course || !type || !date || !timeslot){
        showMessage("⚠ Please select all fields before saving attendance.", false);
        return;
    }

    // 🔒 Disable button
    submitBtn.disabled = true;
    submitBtn.innerText = "Saving...";
    submitBtn.classList.remove("bg-green-600", "hover:bg-green-700");
    submitBtn.classList.add("bg-gray-400", "cursor-not-allowed");

    const formData = new URLSearchParams();
    formData.append("prn", prn);
    formData.append("faculty", faculty);
    formData.append("course", course);
    formData.append("type", type);
    formData.append("date", date);
    formData.append("timeslot", timeslot);
    formData.append("remark", "");

    try{
        await fetch(scriptUrl, {
            method: "POST",
            mode: "no-cors",
            headers: {"Content-Type": "application/x-www-form-urlencoded"},
            body: formData.toString()
        });

        showMessage("✅ Attendance Saved Successfully!", true);
        
        // Wait briefly for user to read success message before reloading
        setTimeout(() => {
            location.reload();
        }, 1500);

    }catch(error){
        showMessage("❌ Error saving attendance. Please try again.", false);
        submitBtn.disabled = false;
        submitBtn.innerText = "Save Attendance";
        submitBtn.classList.remove("bg-gray-400", "cursor-not-allowed");
        submitBtn.classList.add("bg-green-600", "hover:bg-green-700");
    }
});
</script>

</body>
</html>
