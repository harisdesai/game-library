<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AISA Smart Attendance</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#f1f5f9; }

.active-btn{
    background:#2563eb !important;
    color:white !important;
    transform:scale(1.05);
}

.fade-in{
    animation:fade .4s ease-in-out;
}
@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* Mobile tap improvement */
button{
    min-height:48px;
}
</style>
</head>

<body class="p-3 sm:p-6">

<div class="max-w-5xl mx-auto bg-white p-4 sm:p-8 rounded-2xl shadow-xl fade-in">

<h1 class="text-xl sm:text-2xl font-bold text-center mb-6">
AISA Smart Attendance
</h1>

<form id="sheetForm" class="space-y-6">

<!-- PRN -->
<div>
<label class="font-bold text-gray-500 text-sm">Select PRN</label>
<div id="prnGroup" 
class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-2 mt-2"></div>
<input type="hidden" id="prn" required>
</div>

<!-- TYPE -->
<div>
<label class="font-bold text-gray-500 text-sm">Type</label>
<div class="flex gap-2 mt-2">
<button type="button" onclick="setType('L')" id="btnL"
class="flex-1 bg-blue-600 text-white rounded-xl font-bold transition">
Lecture
</button>

<button type="button" onclick="setType('P')" id="btnP"
class="flex-1 bg-gray-200 rounded-xl font-bold transition">
Lab
</button>
</div>
<input type="hidden" id="entryType" value="L">
</div>

<!-- SUBJECT -->
<div>
<label class="font-bold text-gray-500 text-sm">Select Subject</label>
<div id="subjectGroup"
class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-2 mt-2"></div>
<input type="hidden" id="course" required>
</div>

<!-- DATE -->
<div>
<label class="font-bold text-gray-500 text-sm">Date</label>
<input type="date" id="date"
class="w-full border p-3 rounded-xl mt-2 text-center" required>
</div>

<!-- TIME -->
<div>
<label class="font-bold text-gray-500 text-sm">Select Time Slot</label>
<div id="timeGroup"
class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2 mt-2"></div>
<input type="hidden" id="timeslot" required>
</div>

<!-- Sticky Submit Button -->
<div class="sticky bottom-0 bg-white pt-4">
<button type="submit"
class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl text-lg shadow-lg transition">
Save Attendance
</button>
</div>

</form>
</div>

<script>

// 🔴 PASTE YOUR GOOGLE SCRIPT URL HERE
const scriptUrl = "https://script.google.com/macros/s/AKfycbxMAFAVfshAAzoBSuHIO4emmvRZi1kIehTFDB0s81NJNTYcUSY0QssXmdCu0QYMpUgA/exec";

document.getElementById('date').valueAsDate = new Date();

const PRNS = [
"23UAM005","23UAM008","23UAM012","23UAM015","23UAM024",
"23UAM026","23UAM027","23UAM051","23UAM055","23UAM060",
"23UAM063","23UAM079","23UAM086","23UAM111","23UAM121",
"23UAM124","23UET113","24UAM301","24UAM302"
];

const LECTURES = [
"DeepLearning","Elective II","Elective III",
"WebTechnology","Advance Dot Net",
"MDM IOT","MDM Embedded","Honours"
];

const LABS = [
"WebTechnology Lab","Elective II Lab",
"Cloud Computing Lab","MDM (IOT) Lab",
"MDM (EMBEDDED) Lab","DeepLearning Lab",
"Advanced DOT NET Lab"
];

const LECTURE_TIMES = [
"09:40-10:40","10:40-11:40","11:50-12:50",
"12:50-01:50","02:30-03:30","03:30-04:30","04:30-05:30"
];

const LAB_TIMES = [
"09:40-11:40","11:50-01:50","02:30-04:30"
];

// Create Buttons
function createButtons(data, containerId, hiddenId){
const container=document.getElementById(containerId);
container.innerHTML="";
data.forEach(item=>{
let btn=document.createElement("button");
btn.type="button";
btn.innerText=item;
btn.className="bg-gray-200 hover:bg-blue-600 hover:text-white rounded-xl text-sm font-medium transition";

btn.onclick=()=>{
document.getElementById(hiddenId).value=item;
Array.from(container.children).forEach(b=>b.classList.remove("active-btn"));
btn.classList.add("active-btn");
};
container.appendChild(btn);
});
}

createButtons(PRNS,"prnGroup","prn");

function setType(val){
document.getElementById("entryType").value=val;

document.getElementById("btnL").classList.remove("bg-blue-600","text-white");
document.getElementById("btnP").classList.remove("bg-blue-600","text-white");
document.getElementById("btnL").classList.add("bg-gray-200");
document.getElementById("btnP").classList.add("bg-gray-200");

if(val==="L"){
document.getElementById("btnL").classList.add("bg-blue-600","text-white");
createButtons(LECTURES,"subjectGroup","course");
createButtons(LECTURE_TIMES,"timeGroup","timeslot");
}else{
document.getElementById("btnP").classList.add("bg-blue-600","text-white");
createButtons(LABS,"subjectGroup","course");
createButtons(LAB_TIMES,"timeGroup","timeslot");
}
}

setType("L");

// Submit
document.getElementById("sheetForm").addEventListener("submit",async function(e){
e.preventDefault();

const formData=new URLSearchParams();
formData.append("prn",document.getElementById("prn").value);
formData.append("faculty","");
formData.append("course",document.getElementById("course").value);
formData.append("type",document.getElementById("entryType").value);
formData.append("date",document.getElementById("date").value);
formData.append("timeslot",document.getElementById("timeslot").value);
formData.append("remark","");

await fetch(scriptUrl,{
method:"POST",
mode:"no-cors",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:formData.toString()
});

location.reload(); // prevent double submit
});

</script>

</body>
<!-- Footer -->
<footer class="mt-10 text-center text-sm text-gray-500 pb-6">
    © 2026 All Rights Reserved | Developed by 
    <span class="font-semibold text-gray-700">Navanath</span> & 
    <span class="font-semibold text-gray-700">Haris</span>
</footer>
</html>
